<!DOCTYPE html>
<html>
<head>
    <title>Pin Client</title>
    <script src="https://cdn.socket.io/4.3.2/socket.io.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const socket = io('http://localhost:3000');

            function sendPin() {
                // Example pin data
                const pin = {
                    id: Date.now().toString(), // Unique ID for the pin
                    name: "Sample Pin",
                    latitude: 40.689247,
                    longitude: -74.044502,
                    timestamp: new Date().toISOString()
                };
                socket.emit('add_pin', pin);
            }

            // Send a pin when the button is clicked
            document.getElementById('sendPinBtn').addEventListener('click', sendPin);
        });
    </script>
</head>
<body>
    <h1>Pin Sender</h1>
    <button id="sendPinBtn">Send Pin</button>

</body>
</html>
